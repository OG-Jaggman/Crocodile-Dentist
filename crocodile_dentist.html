<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crocodile Dentist Game</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #9ED9A3;
      color: #16301B;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      font-family: 'Comic Sans MS', sans-serif;
      font-size: 32px;
      font-weight: bold;
      margin-top: 20px;
    }

    .game-status {
      font-size: 18px;
      margin-top: 10px;
    }

    .score {
      font-size: 16px;
      margin-top: 5px;
    }

    #canvas {
      background-color: #CDEED1;
      border: 5px solid #16301B;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Crocodile Dentist</h1>
  <div class="game-status" id="game-status">Press a tooth. One random tooth will snap the jaws shut.</div>
  <div class="score" id="score">Safe presses: 0</div>
  
  <canvas id="canvas" width="800" height="500"></canvas>

  <script>
    // Constants
    const TOTAL_TEETH = 10;
    const TOOTH_SPECS = [
      { center: [0.245, 0.540], size: [0.048, 0.090] },
      { center: [0.814, 0.540], size: [0.048, 0.090] },
      { center: [0.268, 0.723], size: [0.044, 0.090] },
      { center: [0.342, 0.758], size: [0.046, 0.094] },
      { center: [0.422, 0.779], size: [0.050, 0.098] },
      { center: [0.510, 0.789], size: [0.052, 0.102] },
      { center: [0.599, 0.786], size: [0.050, 0.098] },
      { center: [0.681, 0.775], size: [0.046, 0.094] },
      { center: [0.755, 0.747], size: [0.044, 0.090] },
      { center: [0.808, 0.709], size: [0.038, 0.082] }
    ];
    const DANGER_COLOR = "#D94B4B";
    const TOOTH_GLOW = "#FFF0D2";
    const TOOTH_PRESSED = "#B9B1A6";

    let canvas, ctx;
    let toothShapes = [];
    let pressedTeeth = new Set();
    let safePresses = 0;
    let gameOver = false;
    let losingTooth = 0;

    window.onload = () => {
      canvas = document.getElementById("canvas");
      ctx = canvas.getContext("2d");
      canvas.addEventListener("click", handleToothPress);

      resetGame();
    };

    function resetGame() {
      safePresses = 0;
      gameOver = false;
      pressedTeeth.clear();
      losingTooth = Math.floor(Math.random() * TOTAL_TEETH);
      document.getElementById("game-status").textContent = "Press a tooth. One random tooth will snap the jaws shut.";
      document.getElementById("score").textContent = `Safe presses: ${safePresses}`;
      drawScene();
    }

    function drawScene() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw teeth
      toothShapes = [];
      const crocImage = new Image();
      crocImage.src = 'Crocodile-Dentist.png';
      crocImage.onload = () => {
        const crocX = canvas.width / 2;
        const crocY = 100;
        ctx.drawImage(crocImage, crocX - crocImage.width / 2, crocY, crocImage.width, crocImage.height);

        TOOTH_SPECS.forEach((spec, index) => {
          const toothX = crocX - crocImage.width / 2 + crocImage.width * spec.center[0];
          const toothY = crocY + crocImage.height * spec.center[1];
          const toothWidth = crocImage.width * spec.size[0];
          const toothHeight = crocImage.height * spec.size[1];

          // Draw the tooth (a circle)
          ctx.beginPath();
          ctx.ellipse(toothX, toothY, toothWidth / 2, toothHeight / 2, 0, 0, 2 * Math.PI);
          ctx.strokeStyle = "#F6EFE3";
          ctx.lineWidth = 2;
          ctx.fillStyle = "transparent";
          ctx.fill();
          ctx.stroke();

          toothShapes.push({ x: toothX, y: toothY, width: toothWidth, height: toothHeight, index });
        });
      };
    }

    function handleToothPress(event) {
      if (gameOver) return;

      const { offsetX, offsetY } = event;

      // Check if click is within any tooth area
      toothShapes.forEach(tooth => {
        const { x, y, width, height, index } = tooth;
        if (offsetX >= x - width / 2 && offsetX <= x + width / 2 && offsetY >= y - height / 2 && offsetY <= y + height / 2) {
          pressTooth(index);
        }
      });
    }

    function pressTooth(index) {
      if (gameOver || pressedTeeth.has(index)) return;

      pressedTeeth.add(index);

      // Update the tooth appearance
      ctx.beginPath();
      const tooth = toothShapes[index];
      ctx.ellipse(tooth.x, tooth.y, tooth.width / 2, tooth.height / 2, 0, 0, 2 * Math.PI);
      ctx.fillStyle = TOOTH_PRESSED;
      ctx.fill();

      if (index === losingTooth) {
        endGame(index);
      } else {
        safePresses++;
        document.getElementById("score").textContent = `Safe presses: ${safePresses}`;
        if (pressedTeeth.size === TOTAL_TEETH - 1) {
          document.getElementById("game-status").textContent = "Only one tooth left. This is the dangerous one.";
        } else {
          document.getElementById("game-status").textContent = "Still safe. Try another tooth.";
        }
      }
    }

    function endGame(index) {
      gameOver = true;
      document.getElementById("game-status").textContent = `Snap! Tooth ${index + 1} triggered the bite.`;
      document.getElementById("game-status").style.color = DANGER_COLOR;
      document.getElementById("score").textContent = `Final safe presses: ${safePresses}`;

      // Highlight the losing tooth
      const losingToothShape = toothShapes[index];
      ctx.beginPath();
      ctx.ellipse(losingToothShape.x, losingToothShape.y, losingToothShape.width / 2, losingToothShape.height / 2, 0, 0, 2 * Math.PI);
      ctx.fillStyle = DANGER_COLOR;
      ctx.fill();

      // Reset game after 3 seconds
      setTimeout(resetGame, 3000);
    }
  </script>

</body>
</html>
